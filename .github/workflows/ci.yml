name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qelp
          POSTGRES_PASSWORD: qelp
          POSTGRES_DB: qelp
        options: >-
          --health-cmd "pg_isready -U qelp -d qelp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://qelp:qelp@localhost:5432/qelp
      AUTH_SECRET: ci-test-secret-not-for-production-only-here
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run db:migrate --workspace @qelp/api
      - run: npm run test --workspaces --if-present
      - run: npm run build --workspace @qelp/widget
